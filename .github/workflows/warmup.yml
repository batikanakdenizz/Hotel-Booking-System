# Pings every Render service every 10 min to keep the free-tier containers
# from sleeping (Render spins free services down after 15 min idle).
#
# WINDOW: this workflow auto-disables itself after WARMUP_UNTIL_UTC -- after
# that date the job exits early without making any curls, so Render services
# go back to sleeping on the free tier. Adjust WARMUP_UNTIL_UTC below to
# extend or shorten.
#
# Why ping every service: pinging only the gateway wakes the gateway but
# leaves search-service / booking-service / etc. asleep. The first real user
# request would then hit a cold downstream and get a 502 while the gateway
# times out trying to proxy.
name: render-warmup

on:
  schedule:
    - cron: "*/10 * * * *"   # GH actually fires this every 10-25 min during peak load
  workflow_dispatch:

env:
  WARMUP_UNTIL_UTC: "2026-05-29"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        service:
          - hbs-gateway
          - hbs-admin-service
          - hbs-search-service
          - hbs-booking-service
          - hbs-comments-service
          - hbs-notification-service
          - hbs-ai-agent-service
    steps:
      - name: Check warmup window
        id: window
        run: |
          today=$(date -u +%F)
          if [[ "$today" > "$WARMUP_UNTIL_UTC" ]]; then
            echo "today ($today) is past WARMUP_UNTIL_UTC ($WARMUP_UNTIL_UTC) -- skipping ping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "today ($today) is within warmup window (ends $WARMUP_UNTIL_UTC)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping ${{ matrix.service }} /health
        if: steps.window.outputs.skip == 'false'
        env:
          URL: https://${{ matrix.service }}.onrender.com/health
        run: |
          set -e
          echo "Pinging $URL"
          # 90s tolerates a worst-case cold-start (~30s) plus margin.
          curl -fsS --max-time 90 "$URL"
